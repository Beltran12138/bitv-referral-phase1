<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BitV 邀请系统一期 · 演示叙事版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Noto Sans SC','Sora',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:rgba(120,130,160,.35);border-radius:8px;}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,-12px);}to{opacity:1;transform:translate(-50%,0);}}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
</style>
<style>
  body{margin:0}
  .narr-top{height:60px;background:#fff;border-bottom:1px solid #e7eaf1;display:flex;align-items:center;padding:0 26px;gap:20px;position:sticky;top:0;z-index:30}
  .narr-brand{display:flex;align-items:center;gap:11px}
  .narr-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(120deg,#204fff,#2020ff,#7264be);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Sora','Noto Sans SC',sans-serif;font-weight:800;font-size:17px}
  .nb-t{font-family:'Sora','Noto Sans SC',sans-serif;font-weight:800;font-size:16px;color:#0c142e}
  .nb-s{font-size:11px;color:#8089a0}
  .narr-nav{display:flex;gap:5px;flex-wrap:wrap}
  .nn{font-family:'Sora',sans-serif;font-weight:800;opacity:.85;margin-right:1px}
  .narr-app{display:flex;align-items:flex-start}
  .narr-left{width:34%;max-width:470px;min-width:330px;padding:44px 40px;position:sticky;top:60px;align-self:flex-start}
  .narr-stage{flex:1;min-width:0;padding:24px 16px;background:radial-gradient(120% 80% at 70% 0%,#eef1f8,#f5f6fa);min-height:calc(100vh - 60px);display:flex;flex-direction:column;align-items:center;gap:8px;overflow-x:auto}
  .narr-stage > div{flex:none}
  .viewtab{display:flex;gap:5px;background:#fff;border:1px solid #e7eaf1;border-radius:999px;padding:4px;width:fit-content;margin:0 auto 16px;box-shadow:0 6px 18px -10px rgba(20,20,60,.3)}
  .narr-body .eyebrow{font-family:'Sora',sans-serif;font-weight:800;font-size:13px;letter-spacing:1.5px;color:#204fff}
  .narr-body .ntitle{font-weight:900;font-size:26px;line-height:1.3;margin-top:12px;color:#0c142e;letter-spacing:-.5px}
  .narr-body .nlede{font-size:14.5px;color:#5b6378;line-height:1.75;margin-top:15px}
  .narr-body .nlede b{color:#0c142e}
  .narr-body .nstep{display:flex;gap:12px;padding:13px 16px;border-radius:13px;border:1px solid #e7eaf1;margin-top:11px;background:#fff}
  .narr-body .nstep .nm{flex:none;width:26px;height:26px;border-radius:8px;background:#eef0f6;color:#8089a0;font-family:'Sora',sans-serif;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center}
  .narr-body .nstep .stt{font-weight:700;font-size:14px;color:#0c142e}
  .narr-body .nstep .stw{font-size:12.5px;color:#8089a0;margin-top:3px;line-height:1.5}
  .narr-body .ntags{margin-top:22px;display:flex;flex-wrap:wrap;gap:8px}
  .narr-body .ntag{font-size:12px;font-weight:600;padding:6px 12px;border-radius:999px;background:#f1f3f9;color:#5b6378}
  .narr-body .ntag.c{background:rgba(22,163,74,.1);color:#15803d}
  .narr-body .ntag.r{background:rgba(209,67,67,.1);color:#d14343}
  .narr-body .nhint{margin-top:24px;font-size:12.5px;color:#8089a0;line-height:1.7;border-top:1px dashed #e3e6ee;padding-top:18px}
  .narr-body .nhint b{color:#204fff}
</style>
</head>
<body>
<div id="app"></div>
<script>
const TPL = "<div class=\"narr-top\"><div class=\"narr-brand\"><div class=\"narr-logo\">B</div><div><div class=\"nb-t\">BitV 邀请系统一期</div><div class=\"nb-s\">关系绑定 · 不含任何奖励发放</div></div></div><div class=\"narr-nav\"><sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"5\"><div onClick=\"{{ n.go }}\" style=\"{{ n.cs }}\"><span class=\"nn\">{{ n.num }}</span>{{ n.label }}</div></sc-for></div></div><div class=\"narr-app\"><aside class=\"narr-left\">{{ narrHtml }}</aside><main class=\"narr-stage\"><sc-if value=\"{{ chShare }}\" hint-placeholder-val=\"\"><div class=\"viewtab\"><div onClick=\"{{ setApp }}\" style=\"{{ tabAppCs }}\">📱 App 版</div><div onClick=\"{{ setWeb }}\" style=\"{{ tabWebCs }}\">💻 Web 版</div></div><!-- ============ SECTION 1: 分享页 + 邀请海报 ============ -->\n  <div style=\"max-width:1320px;margin:40px auto 0;\">\n    <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:18px;\">\n      <span style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:13px;color:#204fff;letter-spacing:1.5px;\">01</span>\n      <h2 style=\"margin:0;font-family:'Sora','Noto Sans SC',sans-serif;font-weight:700;font-size:19px;color:#0c142e;\">分享页 + 邀请海报</h2>\n      <span style=\"font-size:13px;color:#8089a0;\">深色营销 · 3D 水晶视觉</span>\n    </div>\n\n    <div style=\"display:flex;gap:40px;flex-wrap:wrap;align-items:flex-start;\">\n\n      <!-- Frame A: App 分享弹层 -->\n      <div style=\"{{ appDisp }}\">\n        <div style=\"font-family:'Sora',sans-serif;font-size:12px;font-weight:600;color:#8089a0;margin-bottom:11px;letter-spacing:.4px;\">APP · 底部分享弹层</div>\n        <div style=\"width:392px;background:#0b0f1c;border-radius:46px;padding:9px;box-shadow:0 40px 80px -24px rgba(20,20,60,.5);\">\n          <div style=\"width:374px;height:812px;border-radius:38px;overflow:hidden;background:#0c142e;position:relative;display:flex;flex-direction:column;\">\n            <!-- status bar -->\n            \n            <!-- nav -->\n            \n            <!-- poster (App) -->\n            <div style=\"flex:1;overflow:hidden;display:flex;flex-direction:column;align-items:center;padding:6px 20px 0;\">\n              <div style=\"width:100%;border-radius:24px;overflow:hidden;position:relative;background:radial-gradient(120% 80% at 80% 0%,#252c47 0%,#0c142e 55%);border:1px solid rgba(114,100,190,.25);padding:22px 22px 18px;\">\n                <div style=\"position:absolute;top:-40px;right:-30px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(114,100,190,.45),transparent 70%);\"></div>\n                <div style=\"position:relative;display:flex;align-items:flex-start;justify-content:space-between;\">\n                  <div style=\"display:flex;align-items:center;gap:7px;\">\n                    <div style=\"width:20px;height:20px;border-radius:6px;background:linear-gradient(120deg,#204fff,#7264be);\"></div>\n                    <span style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:17px;color:#fff;letter-spacing:-.4px;\">BitV</span>\n                  </div>\n                  <div style=\"text-align:right;border-left:1px solid rgba(255,255,255,.18);padding-left:10px;\">\n                    <div style=\"font-size:11.5px;color:#e6e9f5;font-weight:600;line-height:1.5;\">香港持牌虚拟资产平台</div>\n                    <div style=\"font-size:10px;color:#9aa3bd;line-height:1.5;\">合规交易 · 服务全球</div>\n                  </div>\n                </div>\n                <h3 style=\"margin:18px 0 0;font-family:'Noto Sans SC';font-weight:900;font-size:27px;line-height:1.25;color:#fff;letter-spacing:-.5px;\">持牌合规<br><span style=\"background:linear-gradient(120deg,#5d7bff,#9d8cf0);-webkit-background-clip:text;background-clip:text;color:transparent;\">安全开户</span></h3>\n                <p style=\"margin:8px 0 0;font-size:11.5px;color:#aeb6cf;line-height:1.5;\">香港 1/4/9 号牌 · VATP 持牌<br>一站式合规交易</p>\n                <div style=\"display:flex;justify-content:center;margin:6px 0 10px;animation:float 5s ease-in-out infinite;\">\n                  <div style=\"position:relative;width:158px;height:158px;display:flex;align-items:center;justify-content:center;\">\n                    <div style=\"position:absolute;width:190px;height:190px;border-radius:50%;background:radial-gradient(circle,rgba(93,99,255,.5),transparent 68%);filter:blur(14px);\"></div>\n                    <div style=\"position:relative;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle at 34% 28%,#dbe6ff 0%,#7d8fff 20%,#3a4ce8 46%,#5b34c9 72%,#241069 100%);box-shadow:0 24px 50px -10px rgba(60,40,180,.6),inset -16px -20px 42px rgba(15,8,50,.65),inset 12px 14px 34px rgba(190,205,255,.42);\">\n                      <div style=\"position:absolute;top:16px;left:26px;width:52px;height:36px;border-radius:50%;background:radial-gradient(circle at 40% 40%,rgba(255,255,255,.92),transparent 70%);transform:rotate(-20deg);filter:blur(2px);\"></div>\n                    </div>\n                  </div>\n                </div>\n                <!-- bottom translucent card -->\n                <div style=\"background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:13px;display:flex;align-items:center;justify-content:space-between;gap:12px;\">\n                  <div>\n                    <div style=\"font-size:13px;font-weight:700;color:#fff;line-height:1.45;\">邀请好友加入 BitV</div>\n                    <div style=\"font-size:11px;color:#9aa3bd;margin-top:3px;\">立即扫码注册开户</div>\n                    <div style=\"margin-top:9px;font-family:'Sora',sans-serif;font-size:10px;color:#8089a0;\">邀请码</div>\n                    <div style=\"font-family:'Sora',sans-serif;font-size:18px;font-weight:800;color:#5d7bff;letter-spacing:1px;\">{{ code }}</div>\n                  </div>\n                  <div style=\"width:74px;height:74px;background:#fff;border-radius:11px;padding:6px;flex:none;\">{{ qrA }}</div>\n                </div>\n                <div style=\"text-align:center;font-size:9.5px;color:#6b7490;margin-top:11px;\">受 SFC 监管</div>\n              </div>\n            </div>\n            <!-- bottom sheet share area -->\n            <div style=\"background:#f7f8fc;border-radius:26px 26px 0 0;padding:18px 22px 24px;flex:none;box-shadow:0 -10px 30px -10px rgba(12,20,46,.2);\">\n              <div style=\"width:38px;height:4px;border-radius:4px;background:#d4d8e3;margin:0 auto 16px;\"></div>\n              <div onClick=\"{{ copyCode }}\" style=\"background:#fff;border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border:1px solid #edeff5;\">\n                <span style=\"font-size:13px;color:#5b6378;font-weight:500;\">邀请码</span>\n                <span style=\"display:flex;align-items:center;gap:8px;font-family:'Sora',sans-serif;font-weight:800;font-size:18px;color:#0c142e;letter-spacing:1px;\">{{ code }}<span style=\"color:#204fff;font-size:15px;\">⧉</span></span>\n              </div>\n              <div onClick=\"{{ copyLink }}\" style=\"background:#fff;border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border:1px solid #edeff5;margin-top:10px;\">\n                <span style=\"font-size:13px;color:#5b6378;font-weight:500;\">邀请链接</span>\n                <span style=\"display:flex;align-items:center;gap:8px;font-size:13.5px;color:#0c142e;font-weight:600;\">bitv.com/i/{{ code }}<span style=\"color:#204fff;font-size:15px;\">⧉</span></span>\n              </div>\n              <div style=\"display:flex;justify-content:space-between;margin-top:18px;padding:0 6px;\">\n                <sc-for list=\"{{ channels }}\" as=\"ch\" hint-placeholder-count=\"4\">\n                  <div onClick=\"{{ ch.onClick }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;\">\n                    <div style=\"width:52px;height:52px;border-radius:50%;background:#0c142e;display:flex;align-items:center;justify-content:center;\">{{ ch.icon }}</div>\n                    <span style=\"font-size:11px;color:#5b6378;font-weight:500;\">{{ ch.label }}</span>\n                  </div>\n                </sc-for>\n              </div>\n            </div>\n          </div>\n        </div>\n      </div>\n\n      <!-- Frame B: Web 分享页 -->\n      <div style=\"{{ webDisp }}\">\n        <div style=\"font-family:'Sora',sans-serif;font-size:12px;font-weight:600;color:#8089a0;margin-bottom:11px;letter-spacing:.4px;\">WEB · 分享页（链接自动带码）</div>\n        <div style=\"width:840px;border-radius:16px;overflow:hidden;box-shadow:0 40px 80px -30px rgba(20,20,60,.45);border:1px solid #d9dde8;\">\n          <div style=\"height:42px;background:#0c142e;display:flex;align-items:center;padding:0 16px;gap:8px;\">\n            <span style=\"width:11px;height:11px;border-radius:50%;background:#ff5f57;\"></span>\n            <span style=\"width:11px;height:11px;border-radius:50%;background:#febc2e;\"></span>\n            <span style=\"width:11px;height:11px;border-radius:50%;background:#28c840;\"></span>\n            <div style=\"flex:1;margin:0 70px;background:#1c2440;border-radius:8px;height:24px;display:flex;align-items:center;padding:0 12px;font-family:'Sora',sans-serif;font-size:12px;color:#9aa3bd;\">bitv.com/invite</div>\n          </div>\n          <div style=\"background:radial-gradient(120% 90% at 85% -10%,#252c47 0%,#0c142e 60%);padding:40px;display:flex;gap:38px;align-items:stretch;\">\n            <!-- poster -->\n            <div style=\"width:330px;flex:none;border-radius:22px;overflow:hidden;position:relative;background:radial-gradient(120% 80% at 80% 0%,#2a3252 0%,#0a1126 60%);border:1px solid rgba(114,100,190,.28);padding:26px;\">\n              <div style=\"position:absolute;top:-50px;right:-40px;width:230px;height:230px;border-radius:50%;background:radial-gradient(circle,rgba(114,100,190,.4),transparent 70%);\"></div>\n              <div style=\"position:relative;display:flex;align-items:flex-start;justify-content:space-between;\">\n                <div style=\"display:flex;align-items:center;gap:8px;\">\n                  <div style=\"width:22px;height:22px;border-radius:7px;background:linear-gradient(120deg,#204fff,#7264be);\"></div>\n                  <span style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:19px;color:#fff;letter-spacing:-.4px;\">BitV</span>\n                </div>\n                <div style=\"text-align:right;border-left:1px solid rgba(255,255,255,.18);padding-left:11px;\">\n                  <div style=\"font-size:12px;color:#e6e9f5;font-weight:600;line-height:1.5;\">香港持牌虚拟资产平台</div>\n                  <div style=\"font-size:10.5px;color:#9aa3bd;line-height:1.5;\">合规交易 · 服务全球</div>\n                </div>\n              </div>\n              <h3 style=\"margin:22px 0 0;font-family:'Noto Sans SC';font-weight:900;font-size:32px;line-height:1.22;color:#fff;letter-spacing:-.5px;\">持牌合规<br><span style=\"background:linear-gradient(120deg,#5d7bff,#9d8cf0);-webkit-background-clip:text;background-clip:text;color:transparent;\">安全开户</span></h3>\n              <p style=\"margin:9px 0 0;font-size:12px;color:#aeb6cf;line-height:1.55;\">香港 1/4/9 号牌 · VATP 持牌 · 一站式合规交易</p>\n              <div style=\"display:flex;justify-content:center;margin:10px 0;animation:float 5s ease-in-out infinite;\">\n                <div style=\"position:relative;width:170px;height:170px;display:flex;align-items:center;justify-content:center;\">\n                  <div style=\"position:absolute;width:210px;height:210px;border-radius:50%;background:radial-gradient(circle,rgba(93,99,255,.5),transparent 68%);filter:blur(16px);\"></div>\n                  <div style=\"position:relative;width:162px;height:162px;border-radius:50%;background:radial-gradient(circle at 34% 28%,#dbe6ff 0%,#7d8fff 20%,#3a4ce8 46%,#5b34c9 72%,#241069 100%);box-shadow:0 28px 56px -10px rgba(60,40,180,.6),inset -18px -22px 46px rgba(15,8,50,.65),inset 14px 16px 38px rgba(190,205,255,.42);\">\n                    <div style=\"position:absolute;top:18px;left:28px;width:58px;height:40px;border-radius:50%;background:radial-gradient(circle at 40% 40%,rgba(255,255,255,.92),transparent 70%);transform:rotate(-20deg);filter:blur(2px);\"></div>\n                  </div>\n                </div>\n              </div>\n              <div style=\"background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;\">\n                <div>\n                  <div style=\"font-size:13.5px;font-weight:700;color:#fff;line-height:1.45;\">邀请好友加入 BitV</div>\n                  <div style=\"font-size:11px;color:#9aa3bd;margin-top:3px;\">立即扫码注册开户</div>\n                  <div style=\"margin-top:9px;font-family:'Sora',sans-serif;font-size:10px;color:#8089a0;\">邀请码</div>\n                  <div style=\"font-family:'Sora',sans-serif;font-size:19px;font-weight:800;color:#5d7bff;letter-spacing:1px;\">{{ code }}</div>\n                </div>\n                <div style=\"width:80px;height:80px;background:#fff;border-radius:12px;padding:7px;flex:none;\">{{ qrB }}</div>\n              </div>\n              <div style=\"text-align:center;font-size:10px;color:#6b7490;margin-top:13px;\">受 SFC 监管</div>\n            </div>\n            <!-- share panel -->\n            <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;color:#fff;\">\n              <h3 style=\"margin:0;font-family:'Noto Sans SC';font-weight:900;font-size:26px;letter-spacing:-.4px;\">邀请好友一起上 <span style=\"background:linear-gradient(120deg,#5d7bff,#9d8cf0);-webkit-background-clip:text;background-clip:text;color:transparent;\">BitV</span></h3>\n              <p style=\"margin:10px 0 24px;font-size:14px;color:#aeb6cf;line-height:1.6;\">分享你的专属链接，好友点击后注册页将<b style=\"color:#fff;font-weight:600;\">自动带上你的邀请码</b>，注册填码即与你建立长期邀请关系。</p>\n              <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;\">\n                <div><div style=\"font-size:11px;color:#8089a0;margin-bottom:3px;\">邀请码</div><div style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:20px;letter-spacing:1px;\">{{ code }}</div></div>\n                <button onClick=\"{{ copyCode }}\" style=\"border:none;cursor:pointer;background:rgba(255,255,255,.1);color:#fff;font-family:'Noto Sans SC';font-size:13px;font-weight:600;padding:9px 18px;border-radius:999px;\">复制</button>\n              </div>\n              <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-top:11px;\">\n                <div style=\"overflow:hidden;\"><div style=\"font-size:11px;color:#8089a0;margin-bottom:3px;\">邀请链接</div><div style=\"font-size:14px;font-weight:600;white-space:nowrap;\">https://bitv.com/i/{{ code }}</div></div>\n                <button onClick=\"{{ copyLink }}\" style=\"border:none;cursor:pointer;background:linear-gradient(120deg,#204fff,#2020ff,#7264be);color:#fff;font-family:'Noto Sans SC';font-size:13px;font-weight:600;padding:9px 18px;border-radius:999px;flex:none;margin-left:12px;\">复制链接</button>\n              </div>\n              <div style=\"display:flex;gap:14px;margin-top:24px;\">\n                <sc-for list=\"{{ channels }}\" as=\"ch\" hint-placeholder-count=\"4\">\n                  <div onClick=\"{{ ch.onClick }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;\">\n                    <div style=\"width:50px;height:50px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;\">{{ ch.iconDark }}</div>\n                    <span style=\"font-size:11px;color:#aeb6cf;\">{{ ch.label }}</span>\n                  </div>\n =\"font-size:12.5px;color:#5b6378;font-weight:600;\">登录密码</label>\n              <div style=\"margin:8px 0 18px;height:50px;border:1px solid #e3e6ee;border-radius:14px;display:flex;align-items:center;padding:0 15px;background:#fafbfe;\">\n                <span style=\"font-size:14px;color:#b3b9c9;letter-spacing:3px;\">••••••••</span>\n              </div>\n\n              <div onClick=\"{{ toggleReg }}\" style=\"cursor:pointer;display:flex;align-items:center;gap:7px;margin-bottom:10px;user-select:none;\">\n                <span style=\"font-size:14px;color:#0c142e;font-weight:700;\">邀请码</span>\n                <span style=\"font-size:12px;color:#9aa1b5;font-weight:400;\">（选填）</span>\n                <span style=\"font-size:11px;color:#8089a0;margin-left:2px;\">{{ regCaret }}</span>\n              </div>\n              <sc-if value=\"{{ regOpen }}\" hint-placeholder-val=\"\">\n                <div style=\"margin:0 0 9px;height:50px;border:1.5px solid {{ regBorder }};border-radius:14px;display:flex;align-items:center;padding:0 15px;background:#fff;transition:border-color .2s;\">\n                  <input value=\"{{ regCode }}\" onInput=\"{{ onReg }}\" data-fkey=\"reg\" placeholder=\"手动输入好友的邀请码\" style=\"border:none;outline:none;flex:1;font-family:'Sora',sans-serif;font-size:16px;font-weight:600;letter-spacing:1px;color:#0c142e;background:transparent;\" />\n                  <span onClick=\"{{ fillCode }}\" style=\"cursor:pointer;font-size:12px;color:#204fff;font-weight:600;white-space:nowrap;\">示例</span>\n                </div>\n                <p style=\"margin:0 0 16px;font-size:12px;color:#9aa1b5;line-height:1.6;\">填写邀请码即与好友建立邀请关系；不填则不绑定关系。</p>\n              </sc-if>\n\n\n\n              <button onClick=\"{{ regSubmit }}\" style=\"width:100%;border:none;cursor:pointer;background:linear-gradient(120deg,#204fff,#2020ff,#7264be);color:#fff;font-family:'Noto Sans SC';font-size:16px;font-weight:700;height:52px;border-radius:999px;box-shadow:0 14px 30px -10px rgba(32,79,255,.6);\">注册</button>\n              <p style=\"text-align:center;margin:14px 0 0;font-size:11px;color:#b3b9c9;\">受 SFC 监管</p>\n              </sc-if>\n\n              <!-- 注册成功页（复用 KYC 绿横幅 UI） -->\n              <sc-if value=\"{{ regBound }}\" hint-placeholder-val=\"\">\n                <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:28px;\">\n                  <div style=\"width:88px;height:88px;border-radius:50%;background:linear-gradient(120deg,#16a34a,#22c07a);display:flex;align-items:center;justify-content:center;color:#fff;font-size:42px;box-shadow:0 16px 36px -10px rgba(22,163,74,.5);\">✓</div>\n                  <h3 style=\"margin:20px 0 6px;font-family:'Noto Sans SC';font-weight:900;font-size:23px;color:#0c142e;\">注册成功</h3>\n                  <p style=\"margin:0;font-size:13px;color:#8089a0;line-height:1.6;\">账户已创建 · 邀请关系同时绑定生效</p>\n                </div>\n                <div style=\"margin-top:24px;background:#ecfdf3;border:1px solid #abefc6;border-radius:16px;padding:18px;\">\n                  <div style=\"display:flex;align-items:center;gap:10px;\">\n                    <span style=\"width:26px;height:26px;border-radius:50%;background:#16a34a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;\">✓</span>\n                    <span style=\"font-family:'Noto Sans SC';font-weight:700;font-size:15.5px;color:#15803d;\">邀请关系已绑定生效</span>\n                  </div>\n                  <div style=\"margin-top:12px;background:#fff;border-radius:12px;padding:13px 15px;border:1px solid #d4f3df;\">\n                    <div style=\"font-size:12px;color:#8089a0;\">已绑定邀请人</div>\n                    <div style=\"display:flex;align-items:center;gap:10px;margin-top:7px;\">\n                      <span style=\"width:32px;height:32px;border-radius:50%;background:linear-gradient(120deg,#204fff,#7264be);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-ser olor:#0c142e;\">按 KOL 聚合</span>\n                  <span style=\"font-size:11.5px;color:#9aa1b5;\">一个 KOL 名下所有码加总</span>\n                </div>\n                <div style=\"display:grid;grid-template-columns:1.4fr .8fr .8fr .8fr 1.7fr;padding:13px 22px;background:#fafbfe;font-size:12px;color:#8089a0;font-weight:600;\">\n                  <span>KOL</span><span>总推荐</span><span>已绑定</span><span>已开户</span><span>奖励发放（二期）</span>\n                </div>\n                <sc-for list=\"{{ adminKolRows }}\" as=\"r\" hint-placeholder-count=\"3\">\n                  <div style=\"display:grid;grid-template-columns:1.4fr .8fr .8fr .8fr 1.7fr;padding:14px 22px;border-top:1px solid #f4f5fa;align-items:center;font-size:13.5px;color:#3a4257;\">\n                    <span style=\"font-weight:700;color:#0c142e;\">{{ r.kol }}<span style=\"{{ r.tbs }}\">{{ r.tag }}</span></span>\n                    <span style=\"font-family:'Sora',sans-serif;\">{{ r.total }}</span>\n                    <span style=\"font-family:'Sora',sans-serif;\">{{ r.bound }}</span>\n                    <span style=\"font-family:'Sora',sans-serif;font-weight:700;color:#204fff;\">{{ r.open }}</span>\n                    <span style=\"font-size:12.5px;color:#7a8095;\"><b style=\"color:#0a7c8c;font-family:'Sora',sans-serif;\">{{ r.open }}</b> 人已开户 · <span style=\"color:#b06d00;\">发放规则待二期</span></span>\n                  </div>\n                </sc-for>\n              </div>\n            <div style=\"border-top:1px dashed #e3e6ee;margin:24px 0 16px;\"></div><div style=\"display:flex;align-items:center;gap:9px;margin-bottom:14px;\"><span style=\"font-family:'Noto Sans SC';font-weight:700;font-size:15px;color:#0c142e;\">趋势分析</span><span style=\"display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;background:rgba(32,79,255,.1);color:#204fff;\">二期 · 示意</span></div><div style=\"display:grid;grid-template-columns:1.45fr 1fr;gap:16px;\">\n      <div style=\"background:#fff;border-radius:16px;border:1px solid #edeff5;padding:20px;\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;\">\n          <span style=\"font-family:'Noto Sans SC';font-weight:700;font-size:14px;color:#0c142e;\">邀请注册趋势</span>\n          <div style=\"display:flex;gap:6px;\">\n            <span style=\"font-size:11.5px;font-weight:600;color:#fff;background:#204fff;border-radius:999px;padding:4px 12px;\">周</span>\n            <span style=\"font-size:11.5px;font-weight:600;color:#8089a0;background:#f1f3f9;border-radius:999px;padding:4px 12px;\">月</span>\n          </div>\n        </div>\n        <svg viewBox=\"0 0 340 150\" style=\"width:100%;height:auto;display:block;\">\n          <line x1=\"8\" y1=\"122\" x2=\"334\" y2=\"122\" stroke=\"#eceef5\" stroke-width=\"1\"/>\n          <polygon fill=\"rgba(32,79,255,.07)\" points=\"8,110 62,98 116,101 170,74 224,62 278,40 332,26 332,122 8,122\"/>\n          <polyline fill=\"none\" stroke=\"#204fff\" stroke-width=\"2.5\" points=\"8,110 62,98 116,101 170,74 224,62 278,40 332,26\"/>\n          <g fill=\"#204fff\">\n            <circle cx=\"8\" cy=\"110\" r=\"3\"/><circle cx=\"62\" cy=\"98\" r=\"3\"/><circle cx=\"116\" cy=\"101\" r=\"3\"/><circle cx=\"170\" cy=\"74\" r=\"3\"/><circle cx=\"224\" cy=\"62\" r=\"3\"/><circle cx=\"278\" cy=\"40\" r=\"3\"/><circle cx=\"332\" cy=\"26\" r=\"3\"/>\n          </g>\n          <g fill=\"#9aa1b5\" font-size=\"10\" font-family=\"Sora,sans-serif\">\n            <text x=\"2\" y=\"140\">W1</text><text x=\"56\" y=\"140\">W2</text><text x=\"110\" y=\"140\">W3</text><text x=\"164\" y=\"140\">W4</text><text x=\"218\" y=\"140\">W5</text><text x=\"272\" y=\"140\">W6</text><text x=\"320\" y=\"140\">W7</text>\n          </g>\n        </svg>\n      </div>\n      <div style=\"background:#fff;border-radius:16px;border:1px solid #edeff5;padding:20px;\">\n        <div style=\"font-family:'Noto Sans SC';font-weight:700;font-size:14px;color:#0c142e;margin-bottom:16px;\">跨 KOL 开户对比</div>\n        <div style=\"display:flex;flex-direction:column;gap:13px;\">\n          <div>\n            <div style=\"display:flex;justify-content:space-between;font-size:12.5px;color:#3a4257;margin-bottom:5px;\"><span>Alex</span><span style=\"font-family:'Sora',sans-serif;font-weight:700;\">96</span></div>\n            <div style=\"height:9px;background:#f1f3f9;border-radius:999px;overflow:hidden;\"><div style=\"width:100%;height:100%;background:linear-gradient(90deg,#204fff,#7264be);border-radius:999px;\"></div></div>\n          </div>\n          <div>\n            <div style=\"display:flex;justify-content:space-between;font-size:12.5px;color:#3a4257;margin-bottom:5px;\"><span>Mia</span><span style=\"font-family:'Sora',sans-serif;font-weight:700;\">54</span></div>\n            <div style=\"height:9px;background:#f1f3f9;border-radius:999px;overflow:hidden;\"><div style=\"width:56%;height:100%;background:linear-gradient(90deg,#204fff,#7264be);border-radius:999px;\"></div></div>\n          </div>\n          <div>\n            <div style=\"display:flex;justify-content:space-between;font-size:12.5px;color:#3a4257;margin-bottom:5px;\"><span>Kenji</span><span style=\"font-family:'Sora',sans-serif;font-weight:700;\">40</span></div>\n            <div style=\"height:9px;background:#f1f3f9;border-radius:999px;overflow:hidden;\"><div style=\"width:42%;height:100%;background:linear-gradient(90deg,#204fff,#7264be);border-radius:999px;\"></div></div>\n          </div>\n          <div>\n            <div style=\"display:flex;justify-content:space-between;font-size:12.5px;color:#3a4257;margin-bottom:5px;\"><span>Lyn</span><span style=\"font-family:'Sora',sans-serif;font-weight:700;\">21</span></div>\n            <div style=\"height:9px;background:#f1f3f9;border-radius:999px;overflow:hidden;\"><div style=\"width:22%;height:100%;background:linear-gradient(90deg,#204fff,#7264be);border-radius:999px;\"></div></div>\n          </div>\n        </div>\n      </div>\n    </div></ function badge(status){
  let bg,fg;
  if(status==='已开户'){ bg='rgba(28,236,255,.18)'; fg='#0a7c8c'; }
  else if(status==='已绑定'){ bg='rgba(32,79,255,.12)'; fg='#204fff'; }
  else if(status==='停用'){ bg='rgba(120,120,140,.16)'; fg='#7a8095'; }
  else if(status==='启用'){ bg='rgba(22,163,74,.12)'; fg='#16a34a'; }
  else { bg='rgba(245,158,11,.16)'; fg='#b06d00'; }

}

// ---- 微型运行时（无 React）：sc-for / sc-if / {{ }} / style 对象 / on* 事件 ----
function evalExpr(expr, scope){
  expr=expr.trim();
  if(expr==='true')return true; if(expr==='false')return false;
  const parts=expr.split('.');
  let v = (parts[0] in scope) ? scope[parts[0]] : undefined;
  for(let i=1;i<parts.length && v!=null;i++) v=v[parts[i]];
  return v;
}
function styleObjToCss(o){
  if(o==null)return '';
  if(typeof o==='string')return o;
  return Object.entries(o).map(([k,val])=>k.replace(/[A-Z]/g,m=>'-'+m.toLowerCase())+':'+val).join(';');
}
function interp(str, scope){ return str.replace(/\{\{([\s\S]*?)\}\}/g,(_,e)=>{ const v=evalExpr(e,scope); return v==null?'':String(v); }); }

function transform(node, scope){
  if(node.nodeType===3){
    const txt=node.nodeValue;
    if(txt.indexOf('{{')<0) return [node];
    const m=txt.match(/^\s*\{\{([\s\S]*?)\}\}\s*$/);
    if(m){
      const v=evalExpr(m[1],scope);
      if(typeof v==='string' && v.trim().charAt(0)==='<'){ const sp=document.createElement('span'); sp.style.display='contents'; sp.innerHTML=v; return [sp]; }
      return [document.createTextNode(v==null?'':String(v))];
    }
    return [document.createTextNode(interp(txt,scope))];
  }
  if(node.nodeType!==1) return [node];
  const tag=node.tagName.toLowerCase();
  if(tag==='sc-for'){
    const arr=evalExpr(node.getAttribute('list').replace(/\{\{|\}\}/g,''),scope)||[];
    const as=node.getAttribute('as'); const out=[];
    arr.forEach(item=>{ const cs=Object.assign({},scope,{[as]:item}); [...node.childNodes].forEach(ch=>transform(ch,cs).forEach(n=>out.push(n))); });
    return out;
  }
  if(tag==='sc-if'){
    if(!evalExpr(node.getAttribute('value').replace(/\{\{|\}\}/g,''),scope)) return [];
    const out=[]; [...node.childNodes].forEach(ch=>transform(ch,scope).forEach(n=>out.push(n))); return out;
  }
  const el=node.cloneNode(false);
  [...el.attributes].forEach(a=>{
    const nm=a.name, val=a.value;
    if(nm.indexOf('hint-')===0){ el.removeAttribute(nm); return; }
    if(nm==='style-hover'){ el.removeAttribute(nm); return; }
    if(/^on/i.test(nm) && val.indexOf('{{')>=0){
      const fn=evalExpr(val.replace(/\{\{|\}\}/g,''),scope); el.removeAttribute(nm);
      if(typeof fn==='function') el.addEventListener(nm.slice(2).toLowerCase(),fn);
      return;
    }
    if(val.indexOf('{{')>=0){
      if(nm==='style'){
        const single=val.trim().match(/^\{\{([\s\S]*?)\}\}$/);
        if(single){ const v=evalExpr(single[1],scope); el.setAttribute('style', typeof v==='object'?styleObjToCss(v):(v==null?'':String(v))); }
        else el.setAttribute('style', interp(val,scope));
      } else el.setAttribute(nm, interp(val,scope));
    }
  });
  [...node.childNodes].forEach(ch=>transform(ch,scope).forEach(n=>el.appendChild(n)));
  return [el];
}

function render(){
  const vals=renderVals();
  const holder=document.createElement('div'); holder.innerHTML=TPL;
  const root=document.getElementById('app');
  const af=document.activeElement;
  const fkey=(af&&af.tagName==='INPUT')?af.getAttribute('data-fkey'):null;
  const sel=fkey!=null?af.selectionStart:0;
  const out=[]; [...holder.childNodes].forEach(n=>transform(n,vals).forEach(x=>out.push(x)));
  root.innerHTML=''; out.forEach(n=>root.appendChild(n));
  if(fkey!=null){ const inp=root.querySelector('input[data-fkey="'+fkey+'"]'); if(inp){ inp.focus(); try{inp.setSelectionRange(sel,sel);}catch(e){} } }
}
